<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 9 - Galeria Ikigai</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 2em;
        }

        .header p {
            color: #666;
            margin-top: 10px;
        }

        .imagem-grande {
            width: 100%;
            margin-bottom: 30px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            background: #f5f5f5;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .imagem-grande img {
            width: 100%;
            height: auto;
            display: block;
            transition: all 0.3s ease;
        }

        .galeria {
            display: flex;
            gap: 15px;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .galeria-item {
            flex: 1;
            min-width: 120px;
            cursor: pointer;
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            background: #f5f5f5;
        }

        .galeria-item:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .galeria-item img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            display: block;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            color: #999;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .galeria {
                flex-direction: column;
                gap: 10px;
            }

            .galeria-item {
                min-width: auto;
            }

            .galeria-item img {
                height: auto;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Galeria Ikigai by IA</h1>
            <p>Passa o rato sobre as imagens pequenas</p>
        </div>

        <div class="imagem-grande">
            <img id="imagemPrincipal" src="imagens/design1.png" alt="Imagem principal">
        </div>

        <div class="galeria">
            <div class="galeria-item" data-imagem="imagens/design1.png">
                <img src="imagens/design1.png" alt="Casaco Naruto">
            </div>
            <div class="galeria-item" data-imagem="imagens/design2.png">
                <img src="imagens/design2.png" alt="Casaco Totoro">
            </div>
            <div class="galeria-item" data-imagem="imagens/design3.jpg">
                <img src="imagens/design3.jpg" alt="Attack on Titan">
            </div>
            <div class="galeria-item" data-imagem="imagens/design4.png">
                <img src="imagens/design4.png" alt="Fruits Basket">
            </div>
            <div class="galeria-item" data-imagem="imagens/design5.png">
                <img src="imagens/design5.png" alt="One Piece">
            </div>
            <div class="galeria-item" data-imagem="imagens/design6.png">
                <img src="imagens/design6.png" alt="Howl">
            </div>
        </div>

        <footer>
            <p>Desafio 9 - Galeria Interativa com JavaScript</p>
            <p class="text-muted">Ikigai by IA - Pintura de Anime em Casacos de Ganga</p>
        </footer>
    </div>

    <script>
        let imagemOriginal = document.getElementById("imagemPrincipal").src;
        let galeriaItems = document.querySelectorAll(".galeria-item");

        for (let i = 0; i < galeriaItems.length; i++) {
            let item = galeriaItems[i];
            let novaImagem = item.getAttribute("data-imagem");

            item.addEventListener("mouseenter", function () {
                document.getElementById("imagemPrincipal").src = novaImagem;
            });

            item.addEventListener("mouseleave", function () {
                document.getElementById("imagemPrincipal").src = imagemOriginal;
            });
        }
    </script>
</body>

</html>
