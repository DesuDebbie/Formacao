    <script type="text/JavaScript">
        function carregar() {
            var url = 'https://news.google.com/rss?hl=pt-PT&gl=PT&ceid=PT:pt-150';
            $.ajax({
                url: "https://api.rss2json.com/v1/api.json?rss_url=" + url,
                type: 'GET',
                success: function (data) {
                    var objeto_json = data;
                    var frase = "";
                    for (var i = 0; i < objeto_json.items.length; i++) {
                        frase += "Título: <b>" + objeto_json.items[i].title + "</b><br/>";
                        frase += objeto_json.items[i].description + "<br/>";
                    }
                    $("#caixaI").html(frase);
                },
                error: function (xhr, status, error) {
                    console.log(xhr.responseText);
                    alert('Erro ao carregar notícias');
                }
            });
        }
    </script>
