<!doctype html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Ikigai by IA">
    <meta name="description" content="Formulário de contacto - Ikigai by IA">
    <link rel="icon" type="image/gif" href="./icon/Screenshot 2026-04-09 202943.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="text/javascript" src="./js/verificardadosform.js"></script>
    <link rel="stylesheet" href="./css/style.css">
    <title>Ikigai by IA | Formulário</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,400;0,700;1,600&display=swap"
        rel="stylesheet">
    <script src="https://kit.fontawesome.com/939396d94f.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="header">
        <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html"><img src="./icon/Screenshot 2026-04-09 202943.png"
                        alt="Ikigai" width="45" height="45"></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link" href="index.html">Homepage</a></li>
                        <li class="nav-item"><a class="nav-link" href="galeria.html">Galeria</a></li>
                        <li class="nav-item"><a class="nav-link" href="contactos.html">Contactos</a></li>
                        <li class="nav-item"><a class="nav-link" href="sobre.html">Sobre Nós</a></li>
                        <li class="nav-item"><a class="nav-link" href="formulario.html">Formulário</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>

    <div class="container">
        <div class="form-container">
            <h2 class="text-center mb-3">Peça o seu orçamento</h2>
            <p class="text-center text-muted">Preencha o formulário para pedir o seu casaco personalizado</p>

            <form name="formulario" class="needs-validation" novalidate onsubmit="return validar()">
                <div class="mb-3">
                    <label class="form-label">Nome</label>
                    <input type="text" name="nome" class="form-control" required minlength="3">
                    <div class="invalid-feedback">Nome inválido (mínimo 3 caracteres)</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required>
                    <div class="invalid-feedback">Email inválido</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Telemóvel</label>
                    <input type="tel" name="telemovel" class="form-control" pattern="[0-9]{9}" required>
                    <div class="invalid-feedback">Telemóvel inválido (9 dígitos)</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Tipo de Casaco</label>
                    <select name="assunto" class="form-select" required>
                        <option value="">Escolhe...</option>
                        <option>Casaco Ganga Naruto</option>
                        <option>Casaco Ganga Totoro</option>
                        <option>Casaco Ganga One Piece</option>
                        <option>Casaco Ganga Howl</option>
                        <option>Casaco Personalizado (tema à tua escolha)</option>
                    </select>
                    <div class="invalid-feedback">Seleciona uma opção</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Mensagem / Ideias</label>
                    <textarea name="mensagem" class="form-control" rows="4" required minlength="10"></textarea>
                    <div class="invalid-feedback">Mensagem demasiado curta</div>
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" required>
                    <label class="form-check-label" style="color:#4a2c7a">Aceito a política de privacidade</label>
                    <div class="invalid-feedback">Tens de aceitar</div>
                </div>

                <button class="btn btn-custom w-100" type="submit">Enviar Pedido</button>
            </form>
        </div>
    </div>

    <div class="footer">
        <div class="container-flex">
            <a href="https://www.facebook.com/ikigaibyIA" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.instagram.com/ikigai_by_ia/" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://x.com/" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="https://linkedin.com/" target="_blank"><i class="fab fa-linkedin-in"></i></a>
        </div>
    </div>

    <script>
        (function () {
            'use strict'
            var forms = document.querySelectorAll('.needs-validation')
            Array.prototype.slice.call(forms).forEach(function (form) {
                form.addEventListener('submit', function (event) {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"></script>
</body>

</html>
