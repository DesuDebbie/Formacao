    <div class="container-fluid" py-4>
        <div class="row">
            <div class="col-md-6 mb-4 mb-md-0">
                <div id="morada" class="mb-4">
                    <i class="fas fa-map-marker-alt"></i> Lisboa, Portugal
                </div>
                <div id="telefone" class="mb-4">
                    <i class="fas fa-phone"></i> +351 912 345 678
                </div>
                <div id="mail">
                    <i class="fas fa-envelope"></i> ikigai.byia@gmail.com
                </div>
            </div>

            <div class="col-md-6">
                <h2 id="title-header">Mapa de Localização</h2>
                <label for="destination" id="dest">Qual a sua localização?</label>
                <input type="text" id="destination"
                    style="background-color: #9b6ddf; color: white; border: none; text-align: center;">
                <br><br>
                <button onclick="calculateRoute()" id="botaocinza">Calcular rota</button>
            </div>

            <div id="mapa" style="margin-top: 30px;">
                <iframe width="100%" height="450" frameborder="0" scrolling="no" marginheight="0" marginwidth="0"
                    src="https://www.openstreetmap.org/export/embed.html?bbox=-9.1386%2C38.6199%2C-9.1186%2C38.6399&amp;layer=mapnik&marker=38.7169%2C-9.1399"
                    style="border: 1px solid #9b6ddf" allowfullscreen>
                </iframe>
                <br />
                <a style="color:#9b6ddf"
                    href="https://www.openstreetmap.org/?mlat=38.7169&amp;mlon=-9.1399#map=16/38.7169/-9.1399"
                    target="_blank">
                    Ver mapa maior
                </a>
            </div>
        </div>
    </div>

    <script>
        var fixedLocation = L.latLng(38.7169, -9.1399);
        var map = L.map('map').setView(fixedLocation, 13);
        var marker = L.marker(fixedLocation).addTo(map);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        function calculateRoute() {
            var destination = document.getElementById("destination").value;
            var url = 'https://nominatim.openstreetmap.org/search?format=json&q=' + destination;
            fetch(url)
                .then(function (response) { return response.json(); })
                .then(function (json) {
                    var lat = json[0].lat;
                    var lon = json[0].lon;
                    var routeUrl = 'https://www.openstreetmap.org/directions?engine=graphhopper_car&route=' +
                        fixedLocation.lat + ',' + fixedLocation.lng + ';' + lat + ',' + lon;
                    window.open(routeUrl, '_blank');
                });
        }
    </script>
